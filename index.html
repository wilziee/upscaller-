<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Xaerisoft Ultra HD - Premium Image Enhancer</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS VARIABLES */
        :root {
            --bg-dark: #07090f;
            --glass-bg: rgba(20, 25, 40, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --secondary: #8b5cf6;
            --accent: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* PARTICLES & AURORA BACKGROUND */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #0d1224 0%, #05070a 100%);
        }

        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.4;
            filter: blur(100px);
            pointer-events: none;
        }
        .aurora-1 {
            position: absolute;
            top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
            animation: float 15s infinite alternate ease-in-out;
        }
        .aurora-2 {
            position: absolute;
            bottom: -10%; right: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            animation: float 20s infinite alternate-reverse ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        /* LAYOUT */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px 40px;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .engine-status {
            font-size: 0.85rem;
            padding: 6px 16px;
            border-radius: 50px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .engine-status.ready { color: #34d399; }

        main {
            display: flex;
            flex: 1;
            gap: 20px;
            overflow: hidden;
        }

        /* WORKSPACE */
        .workspace {
            flex: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(20px);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        /* DROP ZONE */
        .drop-zone {
            position: absolute;
            inset: 20px;
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 10;
        }
        .drop-zone.active {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }
        .drop-zone i {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(59,130,246,0.5));
        }
        .drop-zone p { font-size: 1.1rem; margin-bottom: 5px; }
        .drop-zone span { font-size: 0.9rem; color: var(--text-muted); }
        .file-input { display: none; }
        .browse-btn {
            margin-top: 20px;
            padding: 10px 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: var(--transition);
        }
        .browse-btn:hover { background: rgba(255,255,255,0.1); }

        /* VIEWPORT (Pan/Zoom) */
        .viewport {
            position: absolute;
            inset: 0;
            display: none;
            cursor: grab;
            overflow: hidden;
        }
        .viewport:active { cursor: grabbing; }
        
        .transform-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform-origin: center;
            transform: translate(-50%, -50%) scale(1) rotate(0deg);
            width: fit-content;
            height: fit-content;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
        }

        /* COMPARE SLIDER */
        .compare-container {
            position: relative;
            width: 100%;
            height: 100%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .compare-img {
            display: block;
            max-width: none;
            max-height: 70vh;
            object-fit: contain;
        }
        #img-before {
            position: absolute;
            top: 0; left: 0;
            clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
            z-index: 2;
        }
        #img-after {
            display: block;
            z-index: 1;
        }

        .slider-handle {
            position: absolute;
            top: 0; left: 50%;
            width: 2px;
            height: 100%;
            background: #fff;
            z-index: 3;
            transform: translateX(-50%);
            pointer-events: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .slider-button {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            pointer-events: auto;
            cursor: ew-resize;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* FLOATING TOOLBAR */
        .toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            display: flex;
            gap: 10px;
            padding: 8px 15px;
            z-index: 5;
        }
        .tool-btn {
            background: transparent;
            border: none;
            color: white;
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tool-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--primary);
        }

        /* SIDEBAR CONTROLS */
        .sidebar {
            width: 340px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(20px);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .control-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Select Options */
        .radio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .radio-label {
            position: relative;
            cursor: pointer;
        }
        .radio-label input { display: none; }
        .radio-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        .radio-label input:checked + .radio-box {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .res-name { font-weight: 600; font-size: 0.9rem; }
        .res-size { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

        /* Range Slider */
        .range-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 10px var(--primary);
        }
        #quality-val {
            font-size: 0.85rem;
            width: 40px;
            text-align: right;
            font-weight: 600;
        }

        /* Buttons */
        .action-btn {
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        .btn-enhance {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            margin-top: 10px;
        }
        .btn-enhance:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(139, 92, 246, 0.6);
        }
        .btn-enhance:disabled {
            background: rgba(255,255,255,0.1);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-download {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-download:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }

        .download-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* FOOTER */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* LOADING OVERLAY */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(7, 9, 15, 0.85);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .loader-spinner {
            width: 80px; height: 80px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(59,130,246,0.5);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 10px; }
        .loading-step { font-size: 1rem; color: var(--text-muted); margin-bottom: 20px; }
        
        .progress-container {
            width: 400px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            position: absolute;
            top: 0; left: 0; height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--primary);
        }
        .loading-meta {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            width: 400px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            main { flex-direction: column; overflow: auto; }
            .workspace { min-height: 50vh; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Particles Background -->
    <canvas id="canvas-bg"></canvas>
    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>

    <div class="app-container">
        <!-- HEADER -->
        <header>
            <div class="logo">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                Xaerisoft Ultra HD
            </div>
            <div class="engine-status" id="engine-status">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Engine: Loading OpenCV...
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <main>
            <!-- WORKSPACE (LEFT) -->
            <section class="workspace" id="workspace">
                <!-- Drop Zone -->
                <div class="drop-zone" id="drop-zone">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Drag & Drop Image Here</p>
                    <span>or Paste Image (Ctrl+V)</span>
                    <input type="file" id="file-input" class="file-input" accept="image/*">
                    <button class="browse-btn" onclick="document.getElementById('file-input').click()">Browse File</button>
                </div>

                <!-- Viewport for Edit/Compare -->
                <div class="viewport" id="viewport">
                    <div class="transform-wrapper" id="transform-wrapper">
                        <div class="compare-container" id="compare-container">
                            <img id="img-after" class="compare-img" alt="After Enhancement">
                            <img id="img-before" class="compare-img" alt="Before Enhancement">
                            <div class="slider-handle" id="slider-handle">
                                <div class="slider-button"><i class="fa-solid fa-arrows-left-right"></i></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Floating Toolbar -->
                    <div class="toolbar">
                        <button class="tool-btn" id="btn-zoom-in" title="Zoom In"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                        <button class="tool-btn" id="btn-zoom-out" title="Zoom Out"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                        <button class="tool-btn" id="btn-rotate" title="Rotate 90°"><i class="fa-solid fa-rotate-right"></i></button>
                        <button class="tool-btn" id="btn-reset" title="Reset View"><i class="fa-solid fa-expand"></i></button>
                    </div>
                </div>
            </section>

            <!-- SIDEBAR CONTROLS (RIGHT) -->
            <aside class="sidebar">
                
                <!-- Resolution Settings -->
                <div class="control-group">
                    <div class="control-title">Target Resolution</div>
                    <div class="radio-grid">
                        <label class="radio-label">
                            <input type="radio" name="resolution" value="original" checked>
                            <div class="radio-box">
                                <span class="res-name">Original</span>
                                <span class="res-size" id="res-lbl-orig">Auto</span>
                            </div>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="resolution" value="720p">
                            <div class="radio-box">
                                <span class="res-name">720P HD</span>
                                <span class="res-size" id="res-lbl-720">1280×720</span>
                            </div>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="resolution" value="1080p">
                            <div class="radio-box">
                                <span class="res-name">1080P FHD</span>
                                <span class="res-size" id="res-lbl-1080">1920×1080</span>
                            </div>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="resolution" value="2k">
                            <div class="radio-box">
                                <span class="res-name">2K QHD</span>
                                <span class="res-size" id="res-lbl-2k">2560×1440</span>
                            </div>
                        </label>
                        <label class="radio-label" style="grid-column: span 2;">
                            <input type="radio" name="resolution" value="4k">
                            <div class="radio-box">
                                <span class="res-name">4K Ultra HD</span>
                                <span class="res-size" id="res-lbl-4k">3840×2160</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Enhance Button -->
                <button class="action-btn btn-enhance" id="btn-enhance" disabled>
                    <i class="fa-solid fa-wand-magic-sparkles"></i> ENHANCE IMAGE
                </button>

                <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 5px 0;">

                <!-- Export Settings -->
                <div class="control-group">
                    <div class="control-title">Export Quality</div>
                    <div class="range-wrapper">
                        <input type="range" id="export-quality" min="10" max="100" step="5" value="100">
                        <span id="quality-val">100%</span>
                    </div>
                </div>

                <div class="control-group">
                    <div class="control-title">Download Format</div>
                    <div class="download-group">
                        <button class="action-btn btn-download" onclick="downloadImage('image/png', 'png')">
                            <i class="fa-solid fa-download"></i> Download PNG
                        </button>
                        <button class="action-btn btn-download" onclick="downloadImage('image/jpeg', 'jpg')">
                            <i class="fa-solid fa-download"></i> Download JPG
                        </button>
                        <button class="action-btn btn-download" onclick="downloadImage('image/webp', 'webp')">
                            <i class="fa-solid fa-download"></i> Download WEBP
                        </button>
                    </div>
                </div>
            </aside>
        </main>

        <!-- FOOTER -->
        <footer>
            <div>Powered by <strong>Xaerisoft</strong></div>
            <div>Made with by Wilz</div>
            <div>Version 1.0</div>
        </footer>
    </div>

    <!-- LOADING OVERLAY -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loader-spinner"></div>
        <div class="loading-title"> Xaerisoft HD Image</div>
        <div class="loading-step" id="loading-step">Enhancing Image...</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="loading-meta">
            <span id="loading-res">Resolution: -</span>
            <span id="loading-pct">0%</span>
        </div>
    </div>

    <!-- OpenCV.js Library (Loaded Async) -->
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvLoaded();" type="text/javascript"></script>

    <script>
        /* =========================================
           1. PARTICLES & BACKGROUND SYSTEM
           ========================================= */
        const canvasBg = document.getElementById('canvas-bg');
        const ctxBg = canvasBg.getContext('2d');
        let particles = [];
        
        function initParticles() {
            canvasBg.width = window.innerWidth;
            canvasBg.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvasBg.width,
                    y: Math.random() * canvasBg.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    radius: Math.random() * 2.5 + 0.5,
                    color: Math.random() > 0.5 ? '#3b82f6' : '#8b5cf6',
                    alpha: Math.random() * 0.5 + 0.1,
                    alphaChange: (Math.random() - 0.5) * 0.01
                });
            }
        }

        function drawParticles() {
            ctxBg.clearRect(0, 0, canvasBg.width, canvasBg.height);
            for (let p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha += p.alphaChange;

                if (p.alpha <= 0.1 || p.alpha >= 0.7) p.alphaChange *= -1;
                if (p.x < 0) p.x = canvasBg.width;
                if (p.x > canvasBg.width) p.x = 0;
                if (p.y < 0) p.y = canvasBg.height;
                if (p.y > canvasBg.height) p.y = 0;

                ctxBg.beginPath();
                ctxBg.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctxBg.fillStyle = p.color;
                ctxBg.globalAlpha = p.alpha;
                ctxBg.shadowBlur = 10;
                ctxBg.shadowColor = p.color;
                ctxBg.fill();
            }
            ctxBg.globalAlpha = 1.0;
            ctxBg.shadowBlur = 0;
            requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', initParticles);
        initParticles();
        drawParticles();
        /* =========================================
           2. STATE & ENGINE INITIALIZATION
           ========================================= */
        let engineReady = false;
        let originalImage = null; // HTMLImageElement
        let processedCanvas = null; // Holds the final result
        let currentRotation = 0;
        let isPortrait = false;
        let originalFileName = "enhanced_image";

        function onOpenCvLoaded() {
            const checkCv = setInterval(() => {
                if (typeof cv !== 'undefined' && cv.Mat) {
                    clearInterval(checkCv);
                    engineReady = true;
                    document.getElementById('engine-status').innerHTML = '<i class="fa-solid fa-check-circle"></i> Engine Ready';
                    document.getElementById('engine-status').classList.add('ready');
                    if(originalImage) {
                        document.getElementById('btn-enhance').disabled = false;
                    }
                }
            }, 200);
        }

        /* =========================================
           3. FILE UPLOAD & DRAG/DROP
           ========================================= */
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const viewport = document.getElementById('viewport');
        const imgBefore = document.getElementById('img-before');
        const imgAfter = document.getElementById('img-after');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('active'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('active'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            let dt = e.dataTransfer;
            let files = dt.files;
            handleFiles(files);
        });

        fileInput.addEventListener('change', function() { handleFiles(this.files); });

        window.addEventListener('paste', e => {
            if (e.clipboardData && e.clipboardData.files.length > 0) {
                handleFiles(e.clipboardData.files);
            }
        });

        function handleFiles(files) {
            if (files.length === 0) return;
            const file = files[0];
            if (!file.type.startsWith('image/')) {
                alert("Please upload a valid image file.");
                return;
            }
            originalFileName = file.name.split('.')[0] || "image";

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    isPortrait = img.height > img.width;
                    updateResolutionLabels();
                    imgBefore.src = img.src;
                    imgAfter.src = img.src; 
                    resetViewport();
                    dropZone.style.display = 'none';
                    viewport.style.display = 'block';
                    if(engineReady) document.getElementById('btn-enhance').disabled = false;
                    sliderHandle.style.left = '50%';
                    imgBefore.style.clipPath = `polygon(0 0, 50% 0, 50% 100%, 0 100%)`;
                };
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function updateResolutionLabels() {
            document.getElementById('res-lbl-orig').innerText = `${originalImage.width}×${originalImage.height}`;
            document.getElementById('res-lbl-720').innerText = isPortrait ? '720×1280' : '1280×720';
            document.getElementById('res-lbl-1080').innerText = isPortrait ? '1080×1920' : '1920×1080';
            document.getElementById('res-lbl-2k').innerText = isPortrait ? '1440×2560' : '2560×1440';
            document.getElementById('res-lbl-4k').innerText = isPortrait ? '2160×3840' : '3840×2160';
        }

        /* =========================================
           4. PAN, ZOOM, ROTATE, & SLIDER INTERACTION
           ========================================= */
        const transformWrapper = document.getElementById('transform-wrapper');
        const compareContainer = document.getElementById('compare-container');
        const sliderHandle = document.getElementById('slider-handle');
        
        let scale = 1, panX = 0, panY = 0, isDraggingPan = false, startX, startY, isDraggingSlider = false;

        sliderHandle.addEventListener('mousedown', (e) => {
            isDraggingSlider = true;
            e.stopPropagation();
        });
        
        window.addEventListener('mouseup', () => {
            isDraggingSlider = false;
            isDraggingPan = false;
            viewport.style.cursor = 'grab';
        });

        window.addEventListener('mousemove', (e) => {
            if (isDraggingSlider) {
                const rect = compareContainer.getBoundingClientRect();
                let x = e.clientX - rect.left;
                x = Math.max(0, Math.min(x, rect.width));
                let percent = (x / rect.width) * 100;
                sliderHandle.style.left = `${percent}%`;
                imgBefore.style.clipPath = `polygon(0 0, ${percent}% 0, ${percent}% 100%, 0 100%)`;
                return;
            }
            if (isDraggingPan) {
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                panX += dx; panY += dy;
                startX = e.clientX; startY = e.clientY;
                applyTransform();
            }
        });

        viewport.addEventListener('mousedown', (e) => {
            if(e.target.closest('.toolbar') || e.target.closest('.slider-button')) return;
            isDraggingPan = true;
            startX = e.clientX; startY = e.clientY;
            viewport.style.cursor = 'grabbing';
        });

        viewport.addEventListener('wheel', (e) => {
            if(e.target.closest('.toolbar')) return;
            e.preventDefault();
            const zoomAmount = 0.1;
            if (e.deltaY < 0) scale += zoomAmount; else scale -= zoomAmount;
            scale = Math.max(0.2, Math.min(scale, 5));
            applyTransform();
        });

        document.getElementById('btn-zoom-in').onclick = () => { scale = Math.min(scale + 0.2, 5); applyTransform(); };
        document.getElementById('btn-zoom-out').onclick = () => { scale = Math.max(scale - 0.2, 0.2); applyTransform(); };
        document.getElementById('btn-reset').onclick = resetViewport;
        document.getElementById('btn-rotate').onclick = () => { currentRotation = (currentRotation + 90) % 360; applyTransform(); };

        function resetViewport() { scale = 1; panX = 0; panY = 0; currentRotation = 0; applyTransform(); }
        function applyTransform() { transformWrapper.style.transform = `translate(calc(-50% + ${panX}px), calc(-50% + ${panY}px)) scale(${scale}) rotate(${currentRotation}deg)`; }

        const qualitySlider = document.getElementById('export-quality');
        const qualityVal = document.getElementById('quality-val');
        qualitySlider.addEventListener('input', (e) => { qualityVal.innerText = `${e.target.value}%`; });

        /* =========================================
           5. ULTRA HD IMAGE ENGINE (OpenCV + Canvas)
           ========================================= */
        function yieldToBrowser() { return new Promise(resolve => setTimeout(resolve, 15)); }

        function updateProgress(percent, text) {
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('loading-pct').innerText = `${percent}%`;
            document.getElementById('loading-step').innerText = text;
        }

        function getTargetResolution() {
            const selected = document.querySelector('input[name="resolution"]:checked').value;
            let w = originalImage.width; let h = originalImage.height;
            if (selected === '720p') { w = isPortrait ? 720 : 1280; h = isPortrait ? 1280 : 720; }
            else if (selected === '1080p') { w = isPortrait ? 1080 : 1920; h = isPortrait ? 1920 : 1080; }
            else if (selected === '2k') { w = isPortrait ? 1440 : 2560; h = isPortrait ? 2560 : 1440; }
            else if (selected === '4k') { w = isPortrait ? 2160 : 3840; h = isPortrait ? 3840 : 2160; }
            return [w, h];
        }

        document.getElementById('btn-enhance').addEventListener('click', async () => {
            if (!originalImage || !engineReady) return;
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.add('active');
            
            try {
                let [tW, tH] = getTargetResolution();
                let exportW = (currentRotation % 180 !== 0) ? tH : tW;
                let exportH = (currentRotation % 180 !== 0) ? tW : tH;

                document.getElementById('loading-res').innerText = `Resolution: ${exportW}×${exportH}`;
                
                updateProgress(5, 'Resizing Image (High Quality Canvas API)...');
                await yieldToBrowser();

                processedCanvas = document.createElement('canvas');
                processedCanvas.width = exportW;
                processedCanvas.height = exportH;
                const ctx = processedCanvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                
                ctx.translate(exportW/2, exportH/2);
                ctx.rotate(currentRotation * Math.PI / 180);
                ctx.drawImage(originalImage, -tW/2, -tH/2, tW, tH);
                
                updateProgress(25, 'Engine: Analyzing Image Matrix...');
                await yieldToBrowser();
                let src = cv.imread(processedCanvas);
                cv.cvtColor(src, src, cv.COLOR_RGBA2RGB);

                updateProgress(45, 'Engine: Applying Bilateral Filter (Noise Reduction)...');
                await yieldToBrowser();
                let filtered = new cv.Mat();
                cv.bilateralFilter(src, filtered, 5, 50, 50, cv.BORDER_DEFAULT);
                src.delete();

                updateProgress(65, 'Engine: Unsharp Mask & Edge Enhancement...');
                await yieldToBrowser();
                let blur = new cv.Mat();
                cv.GaussianBlur(filtered, blur, new cv.Size(0, 0), 3, 3, cv.BORDER_DEFAULT);
                let unsharp = new cv.Mat();
                cv.addWeighted(filtered, 1.5, blur, -0.5, 0, unsharp);
                filtered.delete(); blur.delete();

                updateProgress(80, 'Engine: Adjusting Contrast, Brightness & Color Balance...');
                await yieldToBrowser();
                let adjusted = new cv.Mat();
                unsharp.convertTo(adjusted, -1, 1.05, 2);
                unsharp.delete();

                let hsv = new cv.Mat();
                cv.cvtColor(adjusted, hsv, cv.COLOR_RGB2HSV);
                let planes = new cv.MatVector();
                cv.split(hsv, planes);
                let sChannel = planes.get(1);
                sChannel.convertTo(sChannel, -1, 1.15, 0);
                planes.set(1, sChannel);
                cv.merge(planes, hsv);
                sChannel.delete(); planes.delete();

                let finalRGB = new cv.Mat();
                cv.cvtColor(hsv, finalRGB, cv.COLOR_HSV2RGB);
                hsv.delete(); adjusted.delete();

                let finalRGBA = new cv.Mat();
                cv.cvtColor(finalRGB, finalRGBA, cv.COLOR_RGB2RGBA);
                finalRGB.delete();

                updateProgress(95, 'Finalizing Output...');
                await yieldToBrowser();
                cv.imshow(processedCanvas, finalRGBA);
                finalRGBA.delete();

                imgAfter.src = processedCanvas.toDataURL('image/png', 1.0);
                updateProgress(100, 'Enhancement Complete!');
                await yieldToBrowser();

            } catch (err) {
                console.error("Enhancement Error: ", err);
                alert("An error occurred during image processing. The image might be too large for device memory.");
            }
            setTimeout(() => { overlay.classList.remove('active'); }, 500);
        });

        /* =========================================
           6. EXPORT / DOWNLOAD SYSTEM
           ========================================= */
        function downloadImage(mimeType, ext) {
            if (!processedCanvas) {
                alert("Please click 'Enhance Image' first before downloading.");
                return;
            }
            const quality = parseInt(document.getElementById('export-quality').value) / 100;
            const dataUrl = processedCanvas.toDataURL(mimeType, quality);
            const link = document.createElement('a');
            link.download = `${originalFileName}_UltraHD.${ext}`;
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
