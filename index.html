<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ XAERISOFT IMAGE ENHANCER PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Animations -->
    <div class="universe-bg"></div>
    <div class="stars" id="particles"></div>
    <div class="mouse-glow" id="mouseGlow"></div>

    <main class="app-container">
        <!-- Header -->
        <header class="glass-panel">
            <h1>✨ XAERISOFT <span>PRO</span></h1>
            <p>Advanced AI Image Processing Engine</p>
        </header>

        <!-- Main Workspace -->
        <div class="workspace-layout">
            
            <!-- Tools Panel -->
            <aside class="controls-panel glass-panel">
                <div class="control-group">
                    <h3>AI Upscale Model</h3>
                    <div class="btn-group grid-2">
                        <button class="scale-btn active" data-scale="1">1×</button>
                        <button class="scale-btn" data-scale="2">2×</button>
                        <button class="scale-btn" data-scale="4">4×</button>
                        <button class="scale-btn" data-scale="8">8×</button>
                        <button class="scale-btn" data-scale="10">10×</button>
                        <button class="scale-btn" data-scale="12">12×</button>
                    </div>
                </div>

                <div class="control-group">
                    <h3>Export Quality (PNG)</h3>
                    <div class="btn-group grid-2">
                        <button class="quality-btn" data-quality="0.5">50%</button>
                        <button class="quality-btn" data-quality="0.75">75%</button>
                        <button class="quality-btn" data-quality="0.9">90%</button>
                        <button class="quality-btn active" data-quality="1">100%</button>
                    </div>
                </div>

                <div class="control-group actions">
                    <button id="processBtn" class="neon-btn primary" disabled>🚀 Process AI</button>
                    <button id="downloadBtn" class="neon-btn secondary" disabled>💾 Download</button>
                </div>
            </aside>

            <!-- Canvas/Preview Area -->
            <section class="preview-panel glass-panel" id="dropZone">
                <div class="upload-prompt" id="uploadPrompt">
                    <div class="icon">🌌</div>
                    <h2>Drag & Drop Image Here</h2>
                    <p>or click to browse</p>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>

                <div class="canvas-container hidden" id="canvasContainer">
                    <canvas id="beforeCanvas"></canvas>
                    <canvas id="afterCanvas"></canvas>
                    <div class="slider-handle" id="sliderHandle">
                        <div class="slider-line"></div>
                        <div class="slider-button">⇹</div>
                    </div>
                </div>

                <!-- Zoom & Pan Controls -->
                <div class="view-controls hidden" id="viewControls">
                    <button id="zoomOut">➖</button>
                    <span id="zoomLevel">100%</span>
                    <button id="zoomIn">➕</button>
                    <button id="resetView">⟲</button>
                </div>
            </section>
        </div>
    </main>

    <!-- Processing Overlay -->
    <div class="processing-overlay hidden" id="loadingOverlay">
        <div class="ai-core">
            <div class="core-ring core-ring-1"></div>
            <div class="core-ring core-ring-2"></div>
            <div class="core-ring core-ring-3"></div>
            <div class="core-glow"></div>
        </div>
        <h2 class="status-text" id="statusText">Initializing AI Neural Net...</h2>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="eta" id="etaText">Estimated time: Calculating...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
